name: GitHub Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const tag = context.ref.replace("refs/tags/", "");

            function escapeRegExp(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function changelogBodyForTag(tagName) {
              const changelogPath = "CHANGELOG.md";
              if (!fs.existsSync(changelogPath)) {
                return "";
              }

              const changelog = fs.readFileSync(changelogPath, "utf8");
              const heading = new RegExp(`^## \\[?${escapeRegExp(tagName)}\\]?.*$`, "m");
              const match = heading.exec(changelog);
              if (!match) {
                return "";
              }

              const contentAfterHeading = changelog.slice(match.index + match[0].length).replace(/^\r?\n/, "");
              const nextHeadingIndex = contentAfterHeading.search(/^##\s/m);
              const section = nextHeadingIndex === -1
                ? contentAfterHeading
                : contentAfterHeading.slice(0, nextHeadingIndex);
              return section.trim();
            }

            const body = changelogBodyForTag(tag);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const release = {
              owner,
              repo,
              tag_name: tag,
              name: `CareerOps Tracker ${tag}`,
              draft: false,
              prerelease: false,
            };

            if (body) {
              release.body = body;
            } else {
              release.generate_release_notes = true;
            }

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              if (body) {
                await github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: existing.data.id,
                  name: release.name,
                  body,
                  draft: false,
                  prerelease: false,
                });
              } else {
                core.notice(`Release ${tag} already exists and no CHANGELOG section was found.`);
              }
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              await github.rest.repos.createRelease({
                ...release,
              });
            }
