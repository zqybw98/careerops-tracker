[tool.ruff]
target-version = "py313"
line-length = 120
src = ["src", "tests"]
extend-exclude = [
    ".venv",
    "data",
    ".pytest_tmp",
    "pytest-cache-files-*",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.mypy]
python_version = "3.13"
files = ["src"]
ignore_missing_imports = true
check_untyped_defs = true
disallow_untyped_defs = true
no_implicit_optional = true
warn_return_any = true
warn_unused_configs = true
pretty = true
